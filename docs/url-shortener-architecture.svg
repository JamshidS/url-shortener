<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <style>
      .title { font: 700 38px Arial, sans-serif; fill: #14213d; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #58657a; }
      .lane-title { font: 700 25px Arial, sans-serif; fill: #14213d; }
      .box-title { font: 700 20px Arial, sans-serif; fill: #14213d; }
      .box-text { font: 400 15px Arial, sans-serif; fill: #526076; }
      .arrow-text { font: 600 14px Arial, sans-serif; fill: #59677c; }
      .box { stroke-width: 2; rx: 16; }
      .arrow { stroke: #5d6c83; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5d6c83"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1500" height="900" fill="#f7f9fc"/>
  <text x="750" y="60" text-anchor="middle" class="title">URL Shortener: Write and Read Paths</text>
  <text x="750" y="94" text-anchor="middle" class="subtitle">The creation path coordinates through Redis; the redirect path goes directly to PostgreSQL.</text>

  <rect x="55" y="130" width="1390" height="300" fill="#eef5ff" stroke="#b8cbea" rx="24"/>
  <text x="95" y="180" class="lane-title">WRITE PATH — create a short URL</text>

  <rect x="100" y="235" width="200" height="110" fill="#ffffff" stroke="#8fa1bb" class="box" filter="url(#shadow)"/>
  <text x="200" y="278" text-anchor="middle" class="box-title">Client</text>
  <text x="200" y="307" text-anchor="middle" class="box-text">POST long URL</text>

  <rect x="410" y="205" width="270" height="170" fill="#dfeaff" stroke="#4f78bd" class="box" filter="url(#shadow)"/>
  <text x="545" y="247" text-anchor="middle" class="box-title">FastAPI Instances</text>
  <text x="545" y="280" text-anchor="middle" class="box-text">Instance A or Instance B</text>
  <text x="545" y="307" text-anchor="middle" class="box-text">Use locally reserved IDs</text>
  <text x="545" y="334" text-anchor="middle" class="box-text">Encode ID to Base62</text>

  <rect x="790" y="220" width="240" height="140" fill="#fff1dc" stroke="#d59432" class="box" filter="url(#shadow)"/>
  <text x="910" y="267" text-anchor="middle" class="box-title">Redis Stack</text>
  <text x="910" y="298" text-anchor="middle" class="box-text">Reserve ID blocks</text>
  <text x="910" y="325" text-anchor="middle" class="box-text">Atomic INCRBY</text>

  <rect x="1140" y="220" width="240" height="140" fill="#e3f7e9" stroke="#4a9b62" class="box" filter="url(#shadow)"/>
  <text x="1260" y="267" text-anchor="middle" class="box-title">PostgreSQL</text>
  <text x="1260" y="298" text-anchor="middle" class="box-text">Store URL mapping</text>
  <text x="1260" y="325" text-anchor="middle" class="box-text">Unique short_code</text>

  <path d="M300 290 L410 290" class="arrow"/>
  <text x="355" y="270" text-anchor="middle" class="arrow-text">create</text>
  <path d="M680 290 L790 290" class="arrow"/>
  <text x="735" y="270" text-anchor="middle" class="arrow-text">reserve when needed</text>
  <path d="M1030 290 L1140 290" class="arrow"/>
  <text x="1085" y="270" text-anchor="middle" class="arrow-text">persist</text>

  <rect x="55" y="475" width="1390" height="300" fill="#f2f8f2" stroke="#bdd8c3" rx="24"/>
  <text x="95" y="525" class="lane-title">READ PATH — resolve and redirect</text>

  <rect x="100" y="580" width="200" height="110" fill="#ffffff" stroke="#8fa1bb" class="box" filter="url(#shadow)"/>
  <text x="200" y="623" text-anchor="middle" class="box-title">Client</text>
  <text x="200" y="652" text-anchor="middle" class="box-text">GET short code</text>

  <rect x="485" y="550" width="270" height="170" fill="#dfeaff" stroke="#4f78bd" class="box" filter="url(#shadow)"/>
  <text x="620" y="592" text-anchor="middle" class="box-title">FastAPI Instances</text>
  <text x="620" y="625" text-anchor="middle" class="box-text">Instance A or Instance B</text>
  <text x="620" y="652" text-anchor="middle" class="box-text">Validate active / expiry</text>
  <text x="620" y="679" text-anchor="middle" class="box-text">Return 301 or 302</text>

  <rect x="940" y="565" width="260" height="140" fill="#e3f7e9" stroke="#4a9b62" class="box" filter="url(#shadow)"/>
  <text x="1070" y="612" text-anchor="middle" class="box-title">PostgreSQL</text>
  <text x="1070" y="643" text-anchor="middle" class="box-text">Lookup short_code</text>
  <text x="1070" y="670" text-anchor="middle" class="box-text">Return original URL</text>

  <path d="M300 635 L485 635" class="arrow"/>
  <text x="392" y="615" text-anchor="middle" class="arrow-text">resolve</text>
  <path d="M755 635 L940 635" class="arrow"/>
  <text x="847" y="615" text-anchor="middle" class="arrow-text">indexed lookup</text>
  <path d="M940 675 C830 760, 420 760, 300 675" class="arrow"/>
  <text x="620" y="750" text-anchor="middle" class="arrow-text">301 / 302 with Location header</text>

  <text x="750" y="835" text-anchor="middle" class="subtitle">Redis is not involved in redirect reads. It coordinates ID ranges only when an application instance needs a new block.</text>
</svg>
